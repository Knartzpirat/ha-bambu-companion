download_dashboard:
  name: Dashboard-YAML generieren
  description: >
    Generiert eine Lovelace-Dashboard-YAML-Datei für den konfigurierten Drucker
    und speichert sie unter /config/www/bambu_companion_dashboard_<serial>.yaml.
